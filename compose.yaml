services:
  testprojectmtech:
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=warehouse_db;Username=postgres;Password=postgres"
    image: testprojectmtech
    build:
      context: .
      dockerfile: TestProjectMTech/Dockerfile
  postgres:
    image: postgres:16
    container_name: mtech-postgres
    environment:
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
